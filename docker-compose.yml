version: '3.9'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - enricher_data:/app/backend/user_uploads
      - enricher_db:/app/backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - FLASK_ENV=production
    networks:
      - enricher_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - enricher_net

volumes:
  enricher_data:
  enricher_db:

networks:
  enricher_net:
